                  >
                    <td style={{ padding: '8px 10px', fontFamily: 'JetBrains Mono' }}>{item._progress}%</td>
                    <td style={{ padding: '8px 10px' }}><span className="step-badge">{item._current_step}</span></td>
                    <td style={{ padding: '8px 10px', fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.프로젝트 || '—'}</td>
                    <td style={{ padding: '8px 10px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.업체명}</td>
                    <td style={{ padding: '8px 10px', fontFamily: 'JetBrains Mono', color: 'var(--muted)' }}>{item['요구납기일'] || '—'}</td>
                    <td style={{ padding: '8px 10px', fontFamily: 'JetBrains Mono', color: 'var(--accent)', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.수주번호}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
    );
  };

  return (
    <>
      <KpiCards kpi={kpi} onCardClick={handleKpiClick} />

      <div className="dash-grid">
        {/* 행1-열1: Stage Progress */}
        <div className="chart-card">
          <div className="chart-title">
            ▤ Stage Progress
            <span className="chart-badge">클릭 시 목록</span>
          </div>
          <div className="card-body">
            <StageByProcessChart data={stageByProcess} onStepClick={step => onFilterStep(step, '전체')} vendorFilter={vendorFilter} />
          </div>
        </div>

        {/* 행1-열2: 전체 상태 분포 */}
        <div className="chart-card">
          <div className="chart-title">
            ● 전체 상태 분포
            <span className="chart-badge">클릭 시 목록</span>
          </div>
          <div className="card-body">
            <StatusDistribution data={statusDist} onBarClick={handleKpiClick} />
          </div>
        </div>

        {/* 행1-열3: 지연 TOP5 */}
        <div className="chart-card">
          <div className="chart-title">
            ⚠ 출고 지연 TOP 5
          </div>
          <div className="card-body">
            <UrgentDelaysList data={urgentDelays} onSelect={setSelectedAlert} />
          </div>
        </div>

        {/* 행2-열1: 단계별 현황 */}
        <div className="chart-card">
          <div className="chart-title">≡ 단계별 현황 · 평균 지연일수</div>
          <div className="card-body">
            <ProjectByStage data={stageByProcess} onStepClick={handleStepClick} vendorFilter={vendorFilter} />
          </div>
        </div>

        {/* 행2-열2: 월별 출고예정 */}
        <div className="chart-card">
          <div className="chart-title">
            📈 월별 출고예정
          </div>
          <div className="card-body" style={{ justifyContent: 'center' }}>
            <MonthlyDeliveryChart data={monthlyDelivery} onBarClick={setMonthlyModal} />
          </div>
        </div>

        {/* 행2-열3: 이달 일정 */}
        <div className="chart-card">
          <div className="chart-title">📅 이달 일정</div>
          <div className="card-body" style={{ justifyContent: 'center' }}>
            <DueSoonPanel alerts={alerts} onSelect={setSelectedAlert} onModalOpen={setDueSoonModal} />
          </div>
        </div>
      </div>

      {monthlyModal && <MonthlyModal monthData={monthlyModal} onClose={() => setMonthlyModal(null)} onSelect={setSelectedAlert} />}
      {dueSoonModal && <ItemModal title={dueSoonModal.title} items={dueSoonModal.items} onClose={() => setDueSoonModal(null)} onSelectItem={(item) => { setSelectedAlert(item); setDueSoonModal(null); }} />}

      {kpiModal && <ModalTable items={kpiModalItems} loading={kpiModalLoading} title={kpiLabelMap[kpiModal] || kpiModal} onClose={() => setKpiModal(null)} />}
      {stepModal && <ModalTable items={stepModalItems} loading={stepModalLoading} title={`${stepModal} 단계`} onClose={() => setStepModal(null)} />}

      {selectedAlert && (
        <DetailDrawer
          item={selectedAlert}
          isAdmin={user.role === 'admin'}
          api={api}
          onClose={() => setSelectedAlert(null)}
          onToast={onToast}
        />
      )}
    </>
  );
}
// ── List Tab ──────────────────────────────────────────────────────────────────
function ListTab({ api, user, initialStepFilter, initialStatusFilter, search: searchProp, onToast, productFilter, vendorFilter = '전체', dueDateCol = '요구납기일', dateFrom = '', dateTo = '' }) {
  const [data, setData] = useState({ items: [], total: 0, page: 1, total_pages: 1 });
  const [page, setPage] = useState(1);
  const [search, setSearch] = useState(searchProp || '');
  const debouncedSearch = useDebounce(search, 400);

  useEffect(() => { setSearch(searchProp || ''); }, [searchProp]);
  const [statusFilter, setStatusFilter] = useState(initialStatusFilter || '전체');
  const [stepFilter, setStepFilter] = useState(initialStepFilter || '전체');
  const [companies, setCompanies] = useState([]);
  const [companyFilter, setCompanyFilter] = useState('전체');
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [checkedRows, setCheckedRows] = useState([]);

  const toggleCheck = (id) => setCheckedRows(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const toggleAll = () => setCheckedRows(checkedRows.length === data.items.length ? [] : data.items.map(i => i._row_id));
  const checkedItems = data.items.filter(i => checkedRows.includes(i._row_id));
  const [sortBy, setSortBy] = useState('수주번호');
  const [sortDir, setSortDir] = useState('asc');

  const steps = ['전체', '수주', '시방', '자재', '생산', '검사', '포장', '출고', ...(vendorFilter !== '국내' ? ['OTP'] : []), '계산서'];
  const statuses = ['전체', 'On Track', 'At Risk', '지연', '출고완료', '계산서완료'];
  const statusLabels = { '전체': '전체', 'On Track': '정상', 'At Risk': '임박', '지연': '지연', '출고완료': '출고완료', '계산서완료': '계산서완료' };

  useEffect(() => { api.get('/api/filters/companies').then(c => setCompanies(['전체', ...c])); }, []);
  useEffect(() => { setStepFilter(initialStepFilter || '전체'); }, [initialStepFilter]);
  useEffect(() => { setStatusFilter(initialStatusFilter || '전체'); }, [initialStatusFilter]);
  useEffect(() => {
    if (initialStepFilter && initialStepFilter !== '전체') {
      setSortBy('_cur_diff'); setSortDir('desc');
    }
  }, [initialStepFilter]);

  const loadData = useCallback(async () => {
    setLoading(true);
    const params = new URLSearchParams({
      page, page_size: 50,
      search: debouncedSearch, status_filter: statusFilter, company_filter: companyFilter,
      step_filter: stepFilter, sort_by: sortBy, sort_dir: sortDir,
      product_filter: Array.isArray(productFilter) ? productFilter.join(',') : (productFilter || '전체'),
      date_col: dueDateCol !== '요구납기일' ? dueDateCol : '',
      date_from: dateFrom,
      date_to: dateTo,
      vendor_filter: vendorFilter || '전체',
    });
    try {
      const res = await api.get(`/api/processes?${params}`);
      setData(res);
    } finally { setLoading(false); }
  }, [page, debouncedSearch, statusFilter, companyFilter, stepFilter, sortBy, sortDir, productFilter, vendorFilter, dueDateCol, dateFrom, dateTo]);

  useEffect(() => { setPage(1); }, [debouncedSearch, statusFilter, companyFilter, stepFilter, productFilter, vendorFilter, dueDateCol, dateFrom, dateTo]);
  useEffect(() => { loadData(); }, [loadData]);

  const handleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('asc'); }
  };

  const handleExport = () => {
    const token = localStorage.getItem('pt_token');
    const params = new URLSearchParams({ search, status_filter: statusFilter, company_filter: companyFilter });
    window.open(`${API}/api/export?${params}`, '_blank');
  };

  const SortIcon = ({ col }) => sortBy === col ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';

  const statusColorMap = STATUS_COLORS;

  const visiblePages = () => {
    const total = data.total_pages;
    const cur = page;
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const pages = [1];
    if (cur > 3) pages.push('...');
    for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) pages.push(i);
    if (cur < total - 2) pages.push('...');
    pages.push(total);
    return pages;
  };

  return (
    <>
      <div className="table-card" style={{ minHeight: 0 }}>
        <div className="table-header">
          <div className="table-header-title">프로젝트 공정 상세 목록</div>
          <div className="filter-group">
            <select className="filter-select" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              {statuses.map(s => <option key={s} value={s}>{statusLabels[s]}</option>)}
            </select>
            <select className="filter-select" value={stepFilter} onChange={e => setStepFilter(e.target.value)}>
              {steps.map(s => <option key={s}>{s}</option>)}
            </select>
            <select className="filter-select" value={companyFilter} onChange={e => setCompanyFilter(e.target.value)}>
              {companies.map(c => <option key={c}>{c}</option>)}
            </select>
            {user.role === 'admin' && (
              <button className="btn-icon" onClick={() => exportToExcel(checkedItems.length > 0 ? checkedItems : data.items, '공정목록')}>
                ↓ 엑셀{checkedItems.length > 0 ? ` (${checkedItems.length}건)` : ''}
              </button>
            )}
          </div>
        </div>

        <div className="table-wrap">
          {loading ? (
            <div className="loading"><div className="dot-loader"><span/><span/><span/></div></div>
          ) : data.items.length === 0 ? (
            <div className="empty-state">검색 결과가 없습니다.</div>
          ) : (
            <table>
              <thead>
                <tr>
                  <th style={{ width: 36, padding: '10px 8px' }}>
                    <input type="checkbox" onChange={toggleAll} checked={checkedRows.length === data.items.length && data.items.length > 0} style={{ cursor: 'pointer' }} />
                  </th>
                  {[['수주번호', '수주번호'], ['업체명', '업체명'], ['호선명', '프로젝트'], ['품명', '품명'], ['현재 단계', '_current_step'], ['진척도', '_progress'], ['상태', '_status'], ['현재단계 차이', '_cur_diff'], ['다음단계 D-', '_next_diff'], ['요구납기', '요구납기일'], ['비고', '비고']].map(([label, col]) => (
                    <th key={col} onClick={() => handleSort(col)}>
                      {label}<SortIcon col={col} />
                    </th>
                  ))}
                  <th>상세</th>
                </tr>
              </thead>
              <tbody>
                {data.items.map((item, i) => {
                  const isChecked = checkedRows.includes(item._row_id);
                  const curDiff = item._cur_diff;
                  const curHasActual = item._cur_has_actual;
                  const nextDiff = item._next_diff;
                  return (
                  <tr key={i} onClick={() => setSelected(item)} style={{ background: isChecked ? 'rgba(59,130,246,0.05)' : '' }}>
                    <td style={{ padding: '10px 8px' }} onClick={e => { e.stopPropagation(); toggleCheck(item._row_id); }}>
                      <input type="checkbox" checked={isChecked} onChange={() => {}} style={{ cursor: 'pointer' }} />
                    </td>
                    <td>
                      <div className="td-mono">{item.수주번호}</div>
                    </td>
                    <td style={{ fontSize: 12, color: 'var(--muted)', maxWidth: 180 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 4, minWidth: 0 }}>
                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>{item.업체명}</span>
                        {item._vendor_type && item._vendor_type !== '미분류' && (
                          <span className={`vendor-badge ${item._vendor_type}`} style={{ flexShrink: 0 }}>{item._vendor_type}</span>
                        )}
                      </div>
                    </td>
                    <td style={{ fontSize: 13, fontWeight: 700 }}>{item.프로젝트}</td>
                    <td>
                      <div style={{ fontSize: 12 }}>{item.품명}</div>
                      <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>{item.시스템명}</div>
                    </td>
                    <td><span className="step-badge">{item._current_step}</span></td>
                    <td>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div className="progress-bar" style={{ flex: 1 }}>
                          <div className={`progress-fill ${item._status === '지연' ? 'progress-red' : 'progress-blue'}`} style={{ width: `${item._progress}%` }} />
                        </div>
                        <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono', fontWeight: 600, minWidth: 30 }}>{item._progress}%</span>
                      </div>
                    </td>
                    <td>
                      <span className="status-dot" style={{ background: statusColorMap[item._status] || 'var(--muted)' }} />
                      <span style={{ color: statusColorMap[item._status], fontWeight: 600, fontSize: 12 }}>{STATUS_LABELS[item._status] || item._status}</span>
                    </td>
                    <td style={{ fontSize: 11, fontFamily: 'JetBrains Mono' }}>
                      {curDiff !== null && curDiff !== undefined ? (
                        <span style={{ color: curDiff > 0 ? 'var(--accent)' : curDiff < 0 ? '#3b82f6' : 'var(--muted)' }}>
                          {!curHasActual && <span style={{ fontSize: 9, marginRight: 3, color: 'var(--accent)', fontWeight: 700 }}>미실적</span>}
                          {curDiff > 0 ? `+${curDiff}일` : curDiff < 0 ? `${curDiff}일` : '정시'}
                        </span>
                      ) : '—'}
                    </td>
                    <td style={{ fontSize: 11, fontFamily: 'JetBrains Mono' }}>
                      {nextDiff !== null && nextDiff !== undefined ? (
                        <span style={{ color: nextDiff > 0 ? 'var(--accent)' : nextDiff <= 7 ? 'var(--accent)' : 'var(--muted)' }}>
                          {nextDiff > 0 ? `+${nextDiff}일` : `D${nextDiff}`}
                        </span>
                      ) : '—'}
                    </td>
                    <td style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--muted)' }}>{item['요구납기일'] || '—'}</td>
                    <td style={{ fontSize: 12, color: 'var(--text2)', maxWidth: 160, minWidth: 120, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={item['비고'] || ''}>
                      {item['비고'] || ''}
                    </td>
                    <td>
                      <button style={{ background: 'rgba(59,130,246,0.1)', border: '1px solid rgba(59,130,246,0.2)', borderRadius: 6, padding: '5px 10px', color: 'var(--accent)', cursor: 'pointer', fontSize: 11, fontWeight: 700, fontFamily: 'Noto Sans KR' }}
                        onClick={e => { e.stopPropagation(); setSelected(item); }}
                      >보기</button>
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        <div className="table-footer">
          <div className="footer-info">
            총 <strong>{data.total.toLocaleString()}</strong>건 중 {((page - 1) * 50 + 1).toLocaleString()}–{Math.min(page * 50, data.total).toLocaleString()} 표시
            {checkedRows.length > 0 && <span style={{ marginLeft: 12, color: 'var(--accent)', fontWeight: 700 }}>{checkedRows.length}건 선택됨</span>}
          </div>
          <div className="pagination">
            <button className="page-btn" onClick={() => setPage(p => p - 1)} disabled={page === 1}>‹</button>
            {visiblePages().map((p, i) => (
              p === '...'
                ? <button key={`e${i}`} className="page-btn" disabled>…</button>
                : <button key={p} className={`page-btn ${p === page ? 'active' : ''}`} onClick={() => setPage(p)}>{p}</button>
            ))}
            <button className="page-btn" onClick={() => setPage(p => p + 1)} disabled={page === data.total_pages}>›</button>
          </div>
        </div>
      </div>

      {selected && (
        <DetailDrawer
          item={selected}
          isAdmin={user.role === 'admin'}
          api={api}
          onClose={() => setSelected(null)}
          onToast={onToast}
        />
      )}
    </>
  );
}

// ── Vendors Tab ──────────────────────────────────────────────────────────────
function VendorsTab({ api, onToast }) {
  const [vendors, setVendors] = useState([]);
  const [search, setSearch] = useState('');
  const [typeFilter, setTypeFilter] = useState('전체');
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState('');
  const [newType, setNewType] = useState('국내');
  const [drag, setDrag] = useState(false);
  const fileRef = useRef();

  const load = () => api.get('/api/vendors').then(v => setVendors(v || []));
  useEffect(() => { load(); }, []);

  const filtered = vendors.filter(v =>
    (typeFilter === '전체' || v.type === typeFilter) &&
    v.name.toLowerCase().includes(search.toLowerCase())
  );

  const toggleType = async (name, current) => {
    const next = current === '국내' ? '해외' : '국내';
    await api.put(`/api/vendors/${encodeURIComponent(name)}`, { type: next });
    load();
  };

  const addVendor = async () => {
    if (!newName.trim()) return;
    await api.post('/api/vendors', { name: newName.trim(), type: newType });
    onToast(`${newName.trim()} 추가 완료.`, 'success');
    setNewName(''); setAdding(false); load();
  };

  const deleteVendor = async (name) => {
    if (!confirm(`"${name}"을 삭제할까요?`)) return;
    await api.delete(`/api/vendors/${encodeURIComponent(name)}`);
    onToast('삭제 완료.', 'success');
    load();
  };

  const handleFile = async (f) => {
    if (!f) return;
    const form = new FormData();
    form.append('file', f);
    const res = await api.upload('/api/vendors/upload', form);
    if (res.count != null) {
      onToast(res.message, 'success');
      load();
    } else {
      onToast(res.detail || '업로드 실패', 'error');
    }
  };

  const domestic = vendors.filter(v => v.type === '국내').length;
  const foreign  = vendors.filter(v => v.type === '해외').length;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16, height: '100%' }}>
      {/* 상단 요약 + 액션 */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', gap: 8 }}>
          {[['전체', vendors.length], ['국내', domestic], ['해외', foreign]].map(([label, cnt]) => (
            <button key={label} onClick={() => setTypeFilter(label)} style={{
              padding: '5px 14px', borderRadius: 20, border: '1px solid var(--border)',
              background: typeFilter === label ? 'var(--accent)' : 'var(--surface2)',
              color: typeFilter === label ? '#fff' : 'var(--muted)',
              fontSize: 12, cursor: 'pointer', fontFamily: 'var(--sans)', transition: 'all 0.15s',
            }}>{label} {cnt}</button>
          ))}
        </div>
        <div className="search-box" style={{ flex: 1, minWidth: 180 }}>
          <span style={{ color: 'var(--muted)', fontSize: 14 }}>⌕</span>
          <input placeholder="업체명 검색..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div style={{ display: 'flex', gap: 8, marginLeft: 'auto' }}>
          <button className="btn-icon" onClick={() => fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}
            style={{ borderColor: drag ? 'var(--accent)' : undefined }}>
            ↑ 엑셀 업로드
          </button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={e => { handleFile(e.target.files[0]); e.target.value=''; }} />
          <button className="btn-icon" onClick={() => setAdding(true)} style={{ color: 'var(--accent)', borderColor: 'rgba(37,99,235,0.3)' }}>
            + 업체 추가
          </button>
        </div>
      </div>

      {/* 추가 폼 */}
      {adding && (
        <div style={{ display: 'flex', gap: 8, padding: '12px 16px', background: 'rgba(37,99,235,0.05)', borderRadius: 10, border: '1px solid rgba(37,99,235,0.15)', alignItems: 'center' }}>
          <input value={newName} onChange={e => setNewName(e.target.value)}
            placeholder="업체명 입력" autoFocus
            style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 8, padding: '7px 12px', fontSize: 13, fontFamily: 'var(--sans)', background: 'var(--surface)', color: 'var(--text)' }}
            onKeyDown={e => e.key === 'Enter' && addVendor()}
          />
          <select value={newType} onChange={e => setNewType(e.target.value)}
            style={{ border: '1px solid var(--border)', borderRadius: 8, padding: '7px 12px', fontSize: 13, fontFamily: 'var(--sans)', background: 'var(--surface)', color: 'var(--text)', cursor: 'pointer' }}>
            <option>국내</option>
            <option>해외</option>
          </select>
          <button className="btn-save" onClick={addVendor} style={{ padding: '7px 18px' }}>추가</button>
          <button className="btn-cancel" onClick={() => { setAdding(false); setNewName(''); }} style={{ padding: '7px 14px' }}>취소</button>
        </div>
      )}

      {/* 테이블 */}
      <div className="table-card" style={{ flex: 1 }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: 'var(--surface2)', borderBottom: '1px solid var(--border)' }}>
              <th style={{ padding: '10px 16px', textAlign: 'left', fontSize: 11, color: 'var(--muted)', fontWeight: 700 }}>업체명</th>
              <th style={{ padding: '10px 16px', textAlign: 'center', fontSize: 11, color: 'var(--muted)', fontWeight: 700, width: 120 }}>구분</th>
              <th style={{ width: 60 }} />
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={3} style={{ padding: 30, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>업체 없음</td></tr>
            )}
            {filtered.map((v, i) => (
              <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--surface2)'}
                onMouseLeave={e => e.currentTarget.style.background = ''}>
                <td style={{ padding: '10px 16px', fontWeight: 500, color: 'var(--text)' }}>{v.name}</td>
                <td style={{ padding: '10px 16px', textAlign: 'center' }}>
                  <button onClick={() => toggleType(v.name, v.type)} style={{
                    padding: '3px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
                    fontSize: 12, fontWeight: 700, fontFamily: 'var(--sans)', transition: 'all 0.15s',
                    background: v.type === '국내' ? 'rgba(37,99,235,0.12)' : 'rgba(100,116,139,0.12)',
                    color: v.type === '국내' ? 'var(--accent)' : 'var(--muted)',
                  }}>{v.type}</button>
                </td>
                <td style={{ padding: '10px 12px', textAlign: 'center' }}>
                  <button onClick={() => deleteVendor(v.name)}
                    style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 14, padding: '2px 6px' }}
                    onMouseEnter={e => e.currentTarget.style.color = '#dc2626'}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--muted)'}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [stepFilter, setStepFilter] = useState('전체');
  const [statusFilterFromDash, setStatusFilterFromDash] = useState('전체');
  const [showUpload, setShowUpload] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);
  const [searchQuery, setSearchQuery] = useState('');
  const [productFilter, setProductFilter] = useState('전체');
  const [vendorFilter, setVendorFilter] = useState('전체');
  const [products, setProducts] = useState([]);
  const [dueDateCol, setDueDateCol] = useState('요구납기일');
  const [lastLoaded, setLastLoaded] = useState(null);
  const [now, setNow] = useState(Date.now());
  const [summaryOpen, setSummaryOpen] = useState(false);
  const [summary, setSummary] = useState(null);

  useEffect(() => {
    const timer = setInterval(() => setNow(Date.now()), 60000);
    return () => clearInterval(timer);
  }, []);

  const fetchSummary = () => {
    if (!api) return;
    api.get('/api/dashboard/summary').then(setSummary).catch(() => {});
  };

  useEffect(() => {
    if (user) fetchSummary();
  }, [user, refreshKey]);
  const today = new Date();
  const fmt = d => d.toISOString().slice(0, 10);
  const [dateFrom, setDateFrom] = useState(fmt(new Date(today.getFullYear(), today.getMonth() - 6, 1)));
  const [dateTo,   setDateTo]   = useState(fmt(new Date(today.getFullYear() + 1, today.getMonth(), 0)));
  const api = useApi();

  useEffect(() => {
    const token = localStorage.getItem('pt_token');
    if (token) {
      fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => setUser(data))
        .catch(() => localStorage.removeItem('pt_token'));
    }
  }, []);

  useEffect(() => {
    if (user) {
      api.get('/api/filters/products').then(p => setProducts(p || []));
    }
  }, [user]);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 4000);
  };

  const handleLogout = () => { localStorage.removeItem('pt_token'); setUser(null); };

  const handleBarClick = (step, statusFilter) => {
    if (step) { setStepFilter(step); }
    setStatusFilterFromDash(statusFilter || '전체');
    setActiveTab('list');
  };

  const pageTitles = {
    dashboard: { title: '종합 대시보드', sub: '실시간 공정 현황 모니터링' },
    list: { title: '공정 목록', sub: '상세 공정 데이터 조회 및 관리' },
    upload: { title: '데이터 업로드', sub: '엑셀 파일 업로드 (관리자 전용)' },
    vendors: { title: '거래처 관리', sub: '국내/해외 구분 및 업체 정보 관리' },
  };

  if (!user) return <LoginPage onLogin={setUser} />;

  const { title, sub } = pageTitles[activeTab] || {};

  return (
    <div className="app">
      <Sidebar
        user={user}
        activeTab={activeTab}
        onTab={(tab) => { if (tab === 'upload') { setActiveTab('upload'); if (user?.role === 'admin') setShowUpload(true); } else { setShowUpload(false); setActiveTab(tab); } }}
        onLogout={handleLogout}
        productFilter={productFilter}
        onProductFilter={(p) => { setProductFilter(p); setRefreshKey(k => k + 1); }}
        products={products}
        dueDateCol={dueDateCol}
        onDueDateCol={(v) => { setDueDateCol(v); setRefreshKey(k => k + 1); }}
        dateFrom={dateFrom} dateTo={dateTo}
        onDateFrom={(v) => { setDateFrom(v); setRefreshKey(k => k + 1); }}
        onDateTo={(v)   => { setDateTo(v);   setRefreshKey(k => k + 1); }}
        vendorFilter={vendorFilter}
        onVendorFilter={(v) => { setVendorFilter(v); setRefreshKey(k => k + 1); }}
      />

      <div className="main">
        <div className="topbar">
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span className="page-title">{title}</span>
            <span className="page-subtitle">{sub}</span>
            {activeTab === 'dashboard' && (
              <button
                onClick={() => setSummaryOpen(o => !o)}
                title="파일 정보"
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 13, padding: '2px 4px', transition: 'transform 0.2s, color 0.15s', transform: summaryOpen ? 'rotate(180deg)' : 'rotate(0deg)' }}
                onMouseEnter={e => e.currentTarget.style.color = 'var(--accent)'}
                onMouseLeave={e => e.currentTarget.style.color = 'var(--muted)'}
              >▼</button>
            )}
            {productFilter !== '전체' && (
              <div style={{ display: 'flex', gap: 4, marginLeft: 4, flexWrap: 'wrap' }}>
                {(Array.isArray(productFilter) ? productFilter : [productFilter]).map(p => (
                  <span key={p} style={{ fontSize: 11, background: 'rgba(59,130,246,0.15)', color: 'var(--accent)', padding: '2px 8px', borderRadius: 10, fontWeight: 700 }}>
                    {p}
                  </span>
                ))}
              </div>
            )}
          </div>
          <div className="topbar-right">
            {activeTab === 'list' && (
              <div className="search-box">
                <span style={{ color: 'var(--muted)', fontSize: 14 }}>⌕</span>
                <input
                  placeholder="수주번호, 업체명, 품명, 호선명 검색..."
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  id="main-search"
                />
              </div>
            )}
            <span style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'JetBrains Mono' }}>
              {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })}
            </span>
            {lastLoaded && (
              <span style={{ fontSize: 11, color: 'var(--muted)' }}>
                업데이트 {Math.max(0, Math.round((now - lastLoaded) / 60000))}분 전
              </span>
            )}
            {activeTab === 'dashboard' && (
              <button
                onClick={() => setRefreshKey(k => k + 1)}
                title="새로고침"
                style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '3px 8px', cursor: 'pointer', color: 'var(--muted)', fontSize: 13, lineHeight: 1, transition: 'all 0.15s' }}
                onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                onMouseLeave={e => { e.currentTarget.style.color = 'var(--muted)'; e.currentTarget.style.borderColor = 'var(--border)'; }}
              >↺</button>
            )}
            {activeTab === 'dashboard' && dueDateCol !== '요구납기일' && (
              <span style={{ fontSize: 11, background: 'rgba(37,99,235,0.1)', color: 'var(--accent)', padding: '3px 8px', borderRadius: 6, fontWeight: 600 }}>기준: {dueDateCol}</span>
            )}
          </div>
        </div>

        {activeTab === 'dashboard' && (
          <div className={`summary-panel ${summaryOpen ? 'open' : ''}`}>
            {summary && summaryOpen && (
              <div className="summary-inner">
                <div className="summary-block">
                  <span className="summary-label">총 건수</span>
                  <span className="summary-val">{summary.total?.toLocaleString()}건</span>
                </div>
                <div className="summary-block">
                  <span className="summary-label">시스템 종류</span>
                  <span className="summary-val" style={{ fontSize: 11, fontFamily: 'var(--sans)' }}>{(summary.systems || []).join(' · ') || '—'}</span>
                </div>
                <div className="summary-block">
                  <span className="summary-label">요구납기 범위</span>
                  <span className="summary-val" style={{ fontSize: 11 }}>{summary.due_min} ~ {summary.due_max}</span>
                </div>
                <div className="summary-block">
                  <span className="summary-label">업체 수</span>
                  <span className="summary-val">{((summary.vendor_counts?.국내||0) + (summary.vendor_counts?.해외||0) + (summary.vendor_counts?.미분류||0))}개사</span>
                  <span className="summary-sub">국내 {summary.vendor_counts?.국내||0} · 해외 {summary.vendor_counts?.해외||0}{summary.vendor_counts?.미분류 > 0 ? ` · 미분류 ${summary.vendor_counts.미분류}` : ''}</span>
                </div>
                <div className="summary-block">
                  <span className="summary-label">단계별 현황</span>
                  <span className="summary-val" style={{ fontSize: 10, fontFamily: 'var(--sans)', fontWeight: 500 }}>
                    {Object.entries(summary.step_counts || {}).map(([k,v]) => `${k} ${v}`).join(' · ')}
                  </span>
                </div>
                <div className="summary-block">
                  <span className="summary-label">마지막 업로드</span>
                  <span className="summary-val" style={{ fontSize: 11 }}>{summary.last_upload || '—'}</span>
                  <span className="summary-sub">{summary.last_file || ''}</span>
                </div>
              </div>
            )}
          </div>
        )}

        <div className="content">
          {activeTab === 'dashboard' && (
            <DashboardTab
              key={refreshKey}
              api={api}
              user={user}
              onFilterStep={handleBarClick}
              onToast={showToast}
              productFilter={productFilter}
              vendorFilter={vendorFilter}
              dueDateCol={dueDateCol}
              dateFrom={dateFrom}
              dateTo={dateTo}
              onLastLoaded={setLastLoaded}
            />
          )}
          {activeTab === 'list' && (
            <ListTab
              api={api}
              user={user}
              initialStepFilter={stepFilter}
              initialStatusFilter={statusFilterFromDash}
              search={searchQuery}
              onToast={showToast}
              productFilter={productFilter}
              vendorFilter={vendorFilter}
              dueDateCol={dueDateCol}
              dateFrom={dateFrom}
              dateTo={dateTo}
            />
          )}
          {activeTab === 'vendors' && (
            <VendorsTab api={api} onToast={showToast} />
          )}
          {activeTab === 'upload' && user?.role !== 'admin' && (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flex: 1, gap: 12, color: 'var(--muted)', padding: 60 }}>
              <div style={{ fontSize: 36 }}>🔒</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)' }}>관리자 전용 메뉴</div>
              <div style={{ fontSize: 13 }}>데이터 업로드는 관리자 계정만 사용할 수 있습니다.</div>
            </div>
          )}
        </div>
      </div>

      {showUpload && user.role === 'admin' && (
        <UploadModal
          api={api}
          onClose={() => setShowUpload(false)}
          onToast={showToast}
          onRefresh={() => setRefreshKey(k => k + 1)}
        />
      )}

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
